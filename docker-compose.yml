version: '3.8'

services:
  infrapilot:
    build:
      context: .
      dockerfile: Dockerfile
    image: infrapilot:latest
    container_name: infrapilot
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      # Add your environment variables here — never commit real secrets
      # - DATABASE_URL=${DATABASE_URL}
      # - SECRET_KEY=${SECRET_KEY}
    restart: unless-stopped
    networks:
      - infrapilot-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   networks:
  #     - infrapilot-net

networks:
  infrapilot-net:
    driver: bridge

volumes:
  db_data:
