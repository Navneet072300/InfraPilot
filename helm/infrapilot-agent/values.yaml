# Default values for infrapilot-agent.
# Override with: helm install --set infrapilot.token=... --set infrapilot.clusterName=...

infrapilot:
  # Required: agent token from InfraPilot Settings > Agent
  token: ""
  # Required: cluster display name (must match the name in InfraPilot)
  clusterName: ""
  # InfraPilot API endpoint
  endpoint: "https://api.infrapilot.dev"
  # Heartbeat interval in seconds (minimum 30 — server enforces rate limit)
  heartbeatInterval: 60
  # Metrics push interval in seconds (minimum 60)
  metricsInterval: 120

# Prometheus node-exporter DaemonSet — collects node metrics (runs on every Linux node)
nodeExporter:
  enabled: true
  image:
    repository: quay.io/prometheus/node-exporter
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  port: 9100

# kube-state-metrics — exposes Kubernetes object state as Prometheus metrics
kubeStateMetrics:
  image:
    repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
    tag: v2.10.0
    pullPolicy: IfNotPresent

# Prometheus — scrapes node-exporter and kube-state-metrics, runs in the Deployment
prometheus:
  image:
    repository: quay.io/prometheus/prometheus
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Heartbeat sender — sends metrics to InfraPilot API
heartbeatSender:
  image:
    repository: infrapilot/agent
    tag: 0.1.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 24Mi
    limits:
      cpu: 50m
      memory: 64Mi

# Namespace to deploy into
namespace: infrapilot-system

# ServiceAccount name
serviceAccountName: infrapilot-agent

# Pod scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Image pull secrets (for private registries)
imagePullSecrets: []

# Extra labels applied to all resources
extraLabels: {}

# Optional Pixie eBPF integration
# Set pixie.enabled=true and supply a deployKey to auto-install Pixie alongside the agent.
# If disabled (default), no Pixie resources are created and everything works as before.
pixie:
  enabled: false
  deployKey: ""          # px:deploy:<your-key-here>
  cloudAddr: "withpixie.ai:443"
  clusterName: ""        # Defaults to the Helm release name if empty
  dataAccess: "Full"     # Full | Restricted
