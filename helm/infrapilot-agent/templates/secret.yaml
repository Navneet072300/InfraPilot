apiVersion: v1
kind: Secret
metadata:
  name: {{ include "infrapilot-agent.name" . }}-token
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "infrapilot-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  INFRAPILOT_TOKEN: {{ required "infrapilot.token is required — get it from Settings > Agent in InfraPilot" .Values.infrapilot.token | quote }}
