{{- if .Values.pixie.enabled }}
{{- if not .Values.pixie.deployKey }}
{{ fail "pixie.deployKey is required when pixie.enabled is true" }}
{{- end }}
---
# Pixie deploy Job — runs px deploy once via the Pixie CLI container.
# Set pixie.enabled=false to skip this entirely.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "infrapilot-agent.fullname" . }}-pixie-deploy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "infrapilot-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: pixie-installer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.serviceAccountName }}
      containers:
        - name: pixie-deploy
          image: gcr.io/pixie-oss/pixie-dev-public/cli/cli_linux_amd64:latest
          command:
            - px
            - deploy
            - --deploy-key={{ .Values.pixie.deployKey }}
            - --cloud-addr={{ .Values.pixie.cloudAddr }}
            - --cluster-name={{ default .Release.Name .Values.pixie.clusterName }}
            - --data-access={{ .Values.pixie.dataAccess }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
{{- end }}
