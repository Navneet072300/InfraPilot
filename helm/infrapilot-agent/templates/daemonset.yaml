{{- if .Values.nodeExporter.enabled }}
# DaemonSet: one node-exporter pod per Linux node, including tainted/control-plane nodes.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "infrapilot-agent.name" . }}-node-exporter
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "infrapilot-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-exporter
spec:
  selector:
    matchLabels:
      {{- include "infrapilot-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: node-exporter
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "infrapilot-agent.labels" . | nindent 8 }}
        app.kubernetes.io/component: node-exporter
    spec:
      serviceAccountName: {{ include "infrapilot-agent.serviceAccountName" . }}
      hostNetwork: true
      hostPID: true

      # Only schedule on Linux nodes — skips Windows nodes automatically.
      nodeSelector:
        kubernetes.io/os: linux

      # Run on ALL Linux nodes, including control-plane and any tainted nodes.
      tolerations:
        - operator: "Exists"
          effect: "NoSchedule"
        - operator: "Exists"
          effect: "NoExecute"
        - operator: "Exists"
          effect: "PreferNoSchedule"

      containers:
        - name: node-exporter
          image: "{{ .Values.nodeExporter.image.repository }}:{{ .Values.nodeExporter.image.tag }}"
          imagePullPolicy: {{ .Values.nodeExporter.image.pullPolicy }}
          args:
            - --path.rootfs=/host
            - --web.listen-address=0.0.0.0:{{ .Values.nodeExporter.port }}
            - --no-collector.wifi
            - --no-collector.hwmon
            - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)
          ports:
            - name: metrics
              containerPort: {{ .Values.nodeExporter.port }}
              hostPort: {{ .Values.nodeExporter.port }}
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: rootfs
              mountPath: /host
              readOnly: true
              mountPropagation: HostToContainer
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
          resources:
            {{- toYaml .Values.nodeExporter.resources | nindent 12 }}

      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
