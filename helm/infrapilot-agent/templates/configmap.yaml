apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "infrapilot-agent.name" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "infrapilot-agent.labels" . | nindent 4 }}
data:
  INFRAPILOT_ENDPOINT: {{ .Values.infrapilot.endpoint | quote }}
  INFRAPILOT_CLUSTER_NAME: {{ required "infrapilot.clusterName is required" .Values.infrapilot.clusterName | quote }}
  HEARTBEAT_INTERVAL: {{ .Values.infrapilot.heartbeatInterval | quote }}
  METRICS_INTERVAL: {{ .Values.infrapilot.metricsInterval | quote }}
  NODE_EXPORTER_URL: "http://localhost:{{ .Values.nodeExporter.port }}/metrics"
  AGENT_VERSION: {{ .Chart.AppVersion | quote }}
