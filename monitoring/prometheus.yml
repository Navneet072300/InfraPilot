global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: infrapilot

rule_files: []

scrape_configs:
  # Self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # InfraPilot backend metrics (if exposed)
  - job_name: infrapilot-backend
    static_configs:
      - targets: [backend:8000]
    metrics_path: /metrics

  # Kubernetes clusters are added dynamically via the InfraPilot backend.
  # Each cluster's kube-state-metrics and node-exporter scrape jobs
  # are generated by prometheus_service.add_cluster() and appended here
  # via the Prometheus lifecycle reload API (POST /-/reload).
  #
  # Example entry added per cluster:
  #   - job_name: cluster-<name>
  #     static_configs:
  #       - targets: [<node-exporter-endpoint>]
  #     relabel_configs:
  #       - target_label: infrapilot_user
  #         replacement: "<user_id>"
  #       - target_label: cluster
  #         replacement: "<cluster_name>"
